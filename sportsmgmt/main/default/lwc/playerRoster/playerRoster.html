<template>
    <!-- Loading Spinner -->
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading..." variant="brand"></lightning-spinner>
    </template>

    <div class="slds-card">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="standard:people" size="medium"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span class="slds-text-heading_medium">Player Roster</span>
                    </h2>
                </div>
            </header>
            <div class="slds-no-flex">
                <lightning-button
                    variant="brand"
                    label="Add Player"
                    onclick={handleCreatePlayer}
                    icon-name="utility:add">
                </lightning-button>
            </div>
        </div>

        <div class="slds-card__body slds-card__body_inner">
            <!-- Filters -->
            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-combobox
                        name="teamFilter"
                        label="Filter by Team"
                        value={selectedTeamId}
                        placeholder="Select a team"
                        options={teamOptions}
                        onchange={handleTeamFilterChange}>
                    </lightning-combobox>
                </div>
            </div>

            <!-- Players List -->
            <template if:true={hasFilteredPlayers}>
                <div class="slds-m-top_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">Players</h3>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <template for:each={filteredPlayers} for:item="player">
                            <div key={player.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                                <div class="slds-box">
                                    <div class="slds-grid slds-grid_align-spread">
                                        <div class="slds-col">
                                            <h4 class="slds-text-heading_small">{player.Name}</h4>
                                            <p class="slds-text-color_weak">
                                                Team: {player.Team__r.Name}
                                            </p>
                                            <template if:true={player.Position__c}>
                                                <p class="slds-text-body_small slds-m-top_xx-small">
                                                    Position: {player.Position__c}
                                                </p>
                                            </template>
                                            <template if:true={player.Jersey_Number__c}>
                                                <p class="slds-text-body_small slds-m-top_xx-small">
                                                    Jersey #: {player.Jersey_Number__c}
                                                </p>
                                            </template>
                                            <template if:true={player.Status__c}>
                                                <span class="slds-badge slds-m-top_xx-small">{player.Status__c}</span>
                                            </template>
                                        </div>
                                        <div class="slds-col slds-no-flex">
                                            <lightning-button-menu
                                                alternative-text="Player Actions"
                                                icon-size="x-small">
                                                <lightning-menu-item
                                                    value="edit"
                                                    label="Edit"
                                                    data-id={player.Id}
                                                    onclick={handleEditPlayer}>
                                                </lightning-menu-item>
                                                <lightning-menu-item
                                                    value="delete"
                                                    label="Delete"
                                                    data-id={player.Id}
                                                    onclick={handleDeletePlayer}>
                                                </lightning-menu-item>
                                            </lightning-button-menu>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template if:false={hasFilteredPlayers}>
                <div class="slds-m-top_medium">
                    <div class="slds-align_absolute-center">
                        <div class="slds-text-color_weak">
                            <lightning-icon icon-name="utility:people" size="large"></lightning-icon>
                            <p class="slds-m-top_small">No players found</p>
                            <p class="slds-text-color_weak">Add your first player to get started</p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Create Player Modal -->
    <template if:true={showCreateModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closeCreateModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Add New Player</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="create-player-name">Player Name</label>
                        <div class="slds-form-element__control">
                            <input type="text" id="create-player-name" class="slds-input"
                                   value={playerName} onchange={handlePlayerNameChange}
                                   placeholder="Enter player name" />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <lightning-combobox
                            name="createTeam"
                            label="Team"
                            value={teamId}
                            placeholder="Select a team"
                            options={teamSelectOptions}
                            onchange={handleTeamChange}
                            required>
                        </lightning-combobox>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <label class="slds-form-element__label" for="create-position">Position</label>
                        <div class="slds-form-element__control">
                            <input type="text" id="create-position" class="slds-input"
                                   value={position} onchange={handlePositionChange}
                                   placeholder="Enter position" />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <label class="slds-form-element__label" for="create-jersey-number">Jersey Number</label>
                        <div class="slds-form-element__control">
                            <input type="number" id="create-jersey-number" class="slds-input"
                                   value={jerseyNumber} onchange={handleJerseyNumberChange}
                                   placeholder="Enter jersey number" />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <label class="slds-form-element__label" for="create-dob">Date of Birth</label>
                        <div class="slds-form-element__control">
                            <input type="date" id="create-dob" class="slds-input"
                                   value={dateOfBirth} onchange={handleDateOfBirthChange} />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <lightning-combobox
                            name="createStatus"
                            label="Status"
                            value={statusValue}
                            placeholder="Select a status"
                            options={statusOptions}
                            onchange={handleStatusChange}>
                        </lightning-combobox>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeCreateModal}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={handleSaveCreate}>Create</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Edit Player Modal -->
    <template if:true={showEditModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closeEditModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Edit Player</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="edit-player-name">Player Name</label>
                        <div class="slds-form-element__control">
                            <input type="text" id="edit-player-name" class="slds-input"
                                   value={playerName} onchange={handlePlayerNameChange}
                                   placeholder="Enter player name" />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <lightning-combobox
                            name="editTeam"
                            label="Team"
                            value={teamId}
                            placeholder="Select a team"
                            options={teamSelectOptions}
                            onchange={handleTeamChange}
                            required>
                        </lightning-combobox>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <label class="slds-form-element__label" for="edit-position">Position</label>
                        <div class="slds-form-element__control">
                            <input type="text" id="edit-position" class="slds-input"
                                   value={position} onchange={handlePositionChange}
                                   placeholder="Enter position" />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <label class="slds-form-element__label" for="edit-jersey-number">Jersey Number</label>
                        <div class="slds-form-element__control">
                            <input type="number" id="edit-jersey-number" class="slds-input"
                                   value={jerseyNumber} onchange={handleJerseyNumberChange}
                                   placeholder="Enter jersey number" />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <label class="slds-form-element__label" for="edit-dob">Date of Birth</label>
                        <div class="slds-form-element__control">
                            <input type="date" id="edit-dob" class="slds-input"
                                   value={dateOfBirth} onchange={handleDateOfBirthChange} />
                        </div>
                    </div>
                    <div class="slds-form-element slds-m-top_medium">
                        <lightning-combobox
                            name="editStatus"
                            label="Status"
                            value={statusValue}
                            placeholder="Select a status"
                            options={statusOptions}
                            onchange={handleStatusChange}>
                        </lightning-combobox>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeEditModal}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={handleSaveEdit}>Save</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Delete Player Modal -->
    <template if:true={showDeleteModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closeDeleteModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Delete Player</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p>Are you sure you want to delete the player <strong>{deletingPlayer.Name}</strong>?</p>
                    <p class="slds-m-top_small slds-text-color_error">
                        This action cannot be undone.
                    </p>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeDeleteModal}>Cancel</button>
                    <button class="slds-button slds-button_destructive" onclick={handleConfirmDelete}>Delete</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
