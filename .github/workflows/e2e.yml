name: E2E

# Playwright end-to-end suite for apps/web (WSM-000141, stabilized in WSM-000172).
#
# Safe-by-default: the suite needs a seedable Convex dev deployment + a Clerk
# test instance, so this job is GATED on repo secrets. When they're absent the
# "Check e2e secrets" step skips the rest and the job still succeeds — it can
# never falsely block a PR. Add the secrets/variables below (Settings →
# Secrets and variables → Actions) to turn the suite on.
#
# Required repo SECRETS:
#   CLERK_SECRET_KEY, NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY,
#   CONVEX_ADMIN_KEY (the DEV deployment's admin/deploy key — used to deploy
#     functions AND to seed),
#   E2E_CLERK_USER_ID, E2E_CLERK_USER_ID_B, E2E_CLERK_ORG_ID, E2E_CLERK_ORG_ID_B
# Required repo VARIABLES (non-secret):
#   NEXT_PUBLIC_CONVEX_URL, NEXT_PUBLIC_CONVEX_SITE_URL, CONVEX_DEPLOYMENT
# Also: set CONVEX_ENABLE_E2E_SEED=1 on the target Convex DEV deployment so the
# internal e2eSeed mutations accept fixture calls.
#
# WSM-000172: the suite kept failing because the shared dev Convex deployment
# drifted behind main (a player-validator change shipped in code but was never
# pushed to dev → data-dependent 500s on the dashboard, which bounced the health
# gate and skipped everything). Fixed in #428 by running an ANONYMOUS LOCAL Convex
# backend inside the runner (the "Start local Convex backend + deploy functions"
# step below) instead of the shared cloud dev deployment: each run gets a hermetic
# backend that matches its own code, and it costs zero cloud function calls.
# Visual regression is a separate job. Linux baselines are committed (WSM-000204),
# but it stays non-blocking until it proves stable across runner-image updates.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dev server + specs read these from the process env (see e2e helpers).
  NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
  NEXT_PUBLIC_CONVEX_SITE_URL: ${{ vars.NEXT_PUBLIC_CONVEX_SITE_URL }}
  CONVEX_DEPLOYMENT: ${{ vars.CONVEX_DEPLOYMENT }}
  CONVEX_ADMIN_KEY: ${{ secrets.CONVEX_ADMIN_KEY }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
  E2E_CLERK_USER_ID_B: ${{ secrets.E2E_CLERK_USER_ID_B }}
  E2E_CLERK_ORG_ID: ${{ secrets.E2E_CLERK_ORG_ID }}
  E2E_CLERK_ORG_ID_B: ${{ secrets.E2E_CLERK_ORG_ID_B }}

jobs:
  # Blocking suite: health gate → auth-gated chromium specs (api-auth runs
  # unauthenticated within the chromium project and asserts 401). Gates PRs.
  playwright:
    name: Playwright (apps/web)
    runs-on: ubuntu-latest
    steps:
      - name: Check e2e secrets
        id: secrets
        run: |
          if [ -z "${CLERK_SECRET_KEY}" ] || [ -z "${NEXT_PUBLIC_CONVEX_URL}" ]; then
            echo "::notice::e2e secrets not configured (CLERK_SECRET_KEY / NEXT_PUBLIC_CONVEX_URL). Skipping the Playwright suite — see WSM-000141 for the required repo secrets and variables."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secrets.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Enable Corepack
        if: steps.secrets.outputs.run == 'true'
        run: corepack enable

      - name: Setup Node.js
        if: steps.secrets.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.secrets.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      # api-contracts ships from built ./dist (tsc), unlike the src-export
      # workspace packages. `pnpm dev` (no turbo) won't build it, so without this
      # Next fails the players/teams routes with "Module not found:
      # @sports-management/api-contracts" — the error boundary then bounces the
      # data specs (WSM-000172).
      - name: Build workspace packages (api-contracts)
        if: steps.secrets.outputs.run == 'true'
        run: pnpm --filter @sports-management/api-contracts build

      # Run an ANONYMOUS LOCAL Convex backend in the runner instead of pushing to
      # the shared cloud dev deployment (WSM-000172, cost): zero cloud function
      # calls, plus a hermetic per-run backend (no shared-deployment drift or
      # cross-PR clobber). CONVEX_AGENT_MODE=anonymous + no TTY makes `convex dev`
      # download the precompiled backend, deploy the PR's functions, and serve
      # locally. We background it (it serves for the whole job) and write its
      # generated URL + admin key to a file the test step sources, so the dev
      # server and seed harness talk to the local backend, not the cloud.
      - name: Start local Convex backend + deploy functions
        if: steps.secrets.outputs.run == 'true'
        working-directory: apps/web
        run: |
          # UNSET the cloud Convex env the workflow injected — an empty-but-set
          # CONVEX_DEPLOYMENT makes the CLI error "No CONVEX_DEPLOYMENT set"
          # instead of falling back to the local config it writes.
          unset CONVEX_DEPLOYMENT CONVEX_ADMIN_KEY CONVEX_SELF_HOSTED_URL
          unset NEXT_PUBLIC_CONVEX_URL NEXT_PUBLIC_CONVEX_SITE_URL
          export CONVEX_AGENT_MODE=anonymous
          # `--local` configures + serves an anonymous local deployment on a fresh
          # runner (no prior .convex/local); AGENT_MODE alone isn't enough there.
          nohup pnpm exec convex dev --local > /tmp/convex-dev.log 2>&1 &
          echo "Waiting for the local Convex backend to deploy functions..."
          for i in $(seq 1 150); do
            grep -q "Convex functions ready" /tmp/convex-dev.log && break
            sleep 1
          done
          if ! grep -q "Convex functions ready" /tmp/convex-dev.log; then
            echo "::error::Local Convex backend did not become ready in time"
            cat /tmp/convex-dev.log
            exit 1
          fi
          CFG=.convex/local/default/config.json
          CLOUD_PORT=$(jq -r '.ports.cloud' "$CFG")
          SITE_PORT=$(jq -r '.ports.site' "$CFG")
          ADMIN_KEY=$(jq -r '.adminKey' "$CFG")
          # The test step sources this so `export` overrides the (cloud) workflow
          # env for the dev server + Playwright seed harness without GITHUB_ENV
          # precedence quirks.
          # Single-quote values: the anonymous admin key contains a '|' which
          # bash would otherwise read as a pipe (exit 127, "command not found").
          {
            echo "export NEXT_PUBLIC_CONVEX_URL='http://127.0.0.1:${CLOUD_PORT}'"
            echo "export NEXT_PUBLIC_CONVEX_SITE_URL='http://127.0.0.1:${SITE_PORT}'"
            echo "export CONVEX_ADMIN_KEY='${ADMIN_KEY}'"
            echo "export CONVEX_DEPLOYMENT="
          } > /tmp/convex-local.env
          # e2eSeed mutations are gated on this flag set ON the deployment.
          pnpm exec convex env set CONVEX_ENABLE_E2E_SEED 1
          echo "Local Convex ready at http://127.0.0.1:${CLOUD_PORT}"

      - name: Install Playwright browser
        if: steps.secrets.outputs.run == 'true'
        run: pnpm --filter @sports-management/web exec playwright install --with-deps chromium

      - name: Run e2e (apps/web)
        if: steps.secrets.outputs.run == 'true'
        # `test:e2e:ci` runs `--project=chromium`, which auto-includes its
        # `health` dependency; the `visual` project runs in its own non-blocking
        # job below. (A dedicated script avoids `pnpm … -- --project=…` arg
        # forwarding mangling the flag into a positional "no tests found" filter.)
        # Source the local-Convex env so the dev server + seed harness point at
        # the in-runner backend (overrides the cloud workflow env for this shell).
        run: |
          source /tmp/convex-local.env
          echo "Using Convex at $NEXT_PUBLIC_CONVEX_URL"
          pnpm --filter @sports-management/web test:e2e:ci

      # The HTML report is an artifact, invisible in the job log. Surface the
      # failed-spec page snapshots inline so a red run is diagnosable from the
      # log alone (the WSM-000172 run had to be reverse-engineered from the
      # downloaded report).
      - name: Print Playwright failures
        if: ${{ failure() && steps.secrets.outputs.run == 'true' }}
        working-directory: apps/web
        run: |
          echo "::group::Playwright failure page snapshots"
          find test-results -name 'error-context.md' -print -exec sed -n '1,40p' {} \; 2>/dev/null || true
          echo "::endgroup::"

      - name: Upload Playwright report
        if: ${{ always() && steps.secrets.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore

  # Visual regression: NON-BLOCKING (continue-on-error), but expected green —
  # Linux baselines are committed as of WSM-000204 (adopted from this job's own
  # rendering; darwin baselines regenerated to the current design tokens at the
  # same time). Kept off the required PR gate until it proves stable across
  # runner-image/font updates; a red run here is a REAL diff worth reviewing in
  # the uploaded report, not baseline rot. To refresh baselines: download the
  # visual-report artifact and commit the actuals, or run --update-snapshots
  # locally for darwin (WSM-000172 / WSM-000082 / WSM-000204).
  # No Convex/Clerk: the /dev/visual harness routes need only the dev server.
  visual:
    name: Visual regression (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check convex var
        id: secrets
        run: |
          if [ -z "${NEXT_PUBLIC_CONVEX_URL}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secrets.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Enable Corepack
        if: steps.secrets.outputs.run == 'true'
        run: corepack enable

      - name: Setup Node.js
        if: steps.secrets.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.secrets.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      # See the blocking job: api-contracts ships built dist, so `pnpm dev` needs
      # it built first or routes that import it 500.
      - name: Build workspace packages (api-contracts)
        if: steps.secrets.outputs.run == 'true'
        run: pnpm --filter @sports-management/api-contracts build

      - name: Install Playwright browser
        if: steps.secrets.outputs.run == 'true'
        run: pnpm --filter @sports-management/web exec playwright install --with-deps chromium

      - name: Run visual regression
        if: steps.secrets.outputs.run == 'true'
        run: pnpm --filter @sports-management/web test:visual

      - name: Upload visual report
        if: ${{ always() && steps.secrets.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
